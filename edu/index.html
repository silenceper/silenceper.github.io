<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班级神兽养成系统 - 视觉预览</title>
  <style>
    :root { --bg:#f8eeee; --card:#fff; --text:#1f2a44; --sub:#6b7280; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1280px; margin: 28px auto; padding: 0 20px 40px; }
    h1 { margin:0 0 10px; font-size: 32px; }
    .desc { margin:0 0 22px; color:var(--sub); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:18px; }
    .card { background:var(--card); border-radius:20px; border:1px solid #f1cad6; box-shadow: 0 8px 24px rgba(242,175,194,.3); overflow:hidden; }
    .card img { width:100%; height:340px; object-fit:cover; display:block; background:#f8f8fb; }
    .meta { padding:12px 14px 16px; font-size:14px; color:#475569; }
    .hint { margin-top:18px; font-size:13px; color:#64748b; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>班级神兽养成系统 · index.pen 视觉素材预览</h1>
    <p class="desc">这是从 <code>index.pen</code> 中引用的神兽素材做的整体展示页，方便你直接在线查看。</p>
    <section class="grid">
      <article class="card">
        <img src="/edu/images/generated-1773362502925.png" alt="神兽素材1" />
        <div class="meta">素材 1</div>
      </article>
      <article class="card">
        <img src="/edu/images/generated-1773362430258.png" alt="神兽素材2" />
        <div class="meta">素材 2</div>
      </article>
      <article class="card">
        <img src="/edu/images/generated-1773362457402.png" alt="神兽素材3" />
        <div class="meta">素材 3</div>
      </article>
      <article class="card">
        <img src="/edu/images/generated-1773362519491.png" alt="神兽素材4" />
        <div class="meta">素材 4</div>
      </article>
    </section>
    <p class="hint">如果你要的是 1:1 还原 index.pen 全画布（包含卡片布局、文字和层级），我下一步可以再做一版完整复刻页面。</p>
  </main>
</body>
</html>
