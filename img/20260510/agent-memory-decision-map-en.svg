<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent memory decision map</title>
  <desc id="desc">A decision map showing what an AI agent should remember, verify again, or never store.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="0.52" stop-color="#eef6f1"/>
      <stop offset="1" stop-color="#f8f3ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 800 54px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14213d; letter-spacing: 0; }
      .subtitle { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4d5b6b; letter-spacing: 0; }
      .card-title { font: 800 29px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #152238; letter-spacing: 0; }
      .card-text { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #405064; letter-spacing: 0; }
      .small { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6c7787; letter-spacing: 0; }
      .pill-text { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .rule { stroke: #c9d4df; stroke-width: 2; stroke-dasharray: 8 10; }
      .arrow { stroke: #607086; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#607086"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="112" r="132" fill="#d7efe6" opacity="0.78"/>
  <circle cx="190" cy="780" r="160" fill="#f2dfb8" opacity="0.38"/>

  <text x="92" y="104" class="title">Persistent Memory Is a Filter, Not a Dump</text>
  <text x="96" y="146" class="subtitle">Only store context that stays useful, stays true, and changes future agent behavior.</text>

  <g transform="translate(90 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="415" height="470" rx="26" fill="#ffffff"/>
    <rect x="0" y="0" width="415" height="14" rx="7" fill="#2f8f6b"/>
    <text x="38" y="64" class="small">REMEMBER</text>
    <text x="38" y="112" class="card-title">Durable working context</text>
    <text x="38" y="164" class="card-text">Project conventions</text>
    <text x="38" y="214" class="card-text">Stable user preferences</text>
    <text x="38" y="264" class="card-text">Repeated failure patterns</text>
    <text x="38" y="314" class="card-text">Decisions with evidence</text>
    <text x="38" y="364" class="card-text">Workflow boundaries</text>
    <rect x="38" y="410" width="230" height="36" rx="18" fill="#e5f4ee"/>
    <text x="58" y="434" class="pill-text" fill="#247252">Saves future work</text>
  </g>

  <g transform="translate(592 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="415" height="470" rx="26" fill="#ffffff"/>
    <rect x="0" y="0" width="415" height="14" rx="7" fill="#4f73d9"/>
    <text x="38" y="64" class="small">VERIFY AGAIN</text>
    <text x="38" y="112" class="card-title">Live or drift-prone facts</text>
    <text x="38" y="164" class="card-text">Prices, dates, schedules</text>
    <text x="38" y="214" class="card-text">API behavior and releases</text>
    <text x="38" y="264" class="card-text">Current branch state</text>
    <text x="38" y="314" class="card-text">Remote service status</text>
    <text x="38" y="364" class="card-text">External claims</text>
    <rect x="38" y="410" width="244" height="36" rx="18" fill="#e8eefc"/>
    <text x="58" y="434" class="pill-text" fill="#355abc">Memory is only a hint</text>
  </g>

  <g transform="translate(1094 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="415" height="470" rx="26" fill="#ffffff"/>
    <rect x="0" y="0" width="415" height="14" rx="7" fill="#d45b4f"/>
    <text x="38" y="64" class="small">DO NOT STORE</text>
    <text x="38" y="112" class="card-title">Risky or noisy material</text>
    <text x="38" y="164" class="card-text">Secrets and credentials</text>
    <text x="38" y="214" class="card-text">Raw private transcripts</text>
    <text x="38" y="264" class="card-text">Unverified assumptions</text>
    <text x="38" y="314" class="card-text">One-off temporary state</text>
    <text x="38" y="364" class="card-text">Sensitive personal data</text>
    <rect x="38" y="410" width="247" height="36" rx="18" fill="#fcebea"/>
    <text x="58" y="434" class="pill-text" fill="#b64037">Higher recall risk</text>
  </g>

  <line x1="506" y1="455" x2="574" y2="455" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1008" y1="455" x2="1076" y2="455" class="arrow" marker-end="url(#arrowhead)"/>

  <line x1="90" y1="750" x2="1510" y2="750" class="rule"/>
  <text x="92" y="804" class="card-title">The practical test</text>
  <text x="92" y="846" class="subtitle">If it cannot be traced, expires quickly, or should be re-read from the source of truth, do not turn it into memory.</text>
</svg>
