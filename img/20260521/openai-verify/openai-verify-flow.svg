<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="55%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:50px;font-weight:800;fill:#f8fafc}
    .sub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:24px;fill:#cbd5e1}
    .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:25px;font-weight:700;fill:#0f172a}
    .small{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:19px;fill:#475569}
    .white{fill:#fff}.muted{fill:#94a3b8}.accent{fill:#34d399}.stroke{stroke:#334155;stroke-width:2;fill:none}
  </style>
</defs>

<rect width="1400" height="820" fill="url(#bg)"/>
<circle cx="1180" cy="110" r="180" fill="#22c55e" opacity="0.10"/>
<circle cx="180" cy="720" r="220" fill="#38bdf8" opacity="0.08"/>
<text x="90" y="105" class="title">OpenAI 图像验证工具</text>
<text x="92" y="150" class="sub">不是判断图片真假，而是检测图片中是否存在 OpenAI 生成内容的溯源特征</text>

<g filter="url(#shadow)">
  <rect x="92" y="245" width="300" height="260" rx="32" fill="#f8fafc"/>
  <rect x="132" y="290" width="220" height="125" rx="18" fill="#e2e8f0"/>
  <path d="M160 390 L215 335 L260 375 L295 350 L335 390 Z" fill="#94a3b8"/>
  <circle cx="310" cy="320" r="15" fill="#64748b"/>
  <text x="242" y="455" text-anchor="middle" class="label">上传图片</text>
  <text x="242" y="488" text-anchor="middle" class="small">PNG / JPG / WEBP</text>
</g>

<path d="M430 375 H535" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
<path d="M535 375 L512 358 M535 375 L512 392" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>

<g filter="url(#shadow)">
  <rect x="572" y="245" width="300" height="260" rx="32" fill="#f8fafc"/>
  <circle cx="722" cy="340" r="62" fill="#d1fae5" stroke="#10b981" stroke-width="7"/>
  <path d="M695 340 L715 362 L752 315" fill="none" stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="722" y="455" text-anchor="middle" class="label">扫描溯源特征</text>
  <text x="722" y="488" text-anchor="middle" class="small">C2PA 元数据 + SynthID 水印</text>
</g>

<path d="M910 375 H1015" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
<path d="M1015 375 L992 358 M1015 375 L992 392" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>

<g filter="url(#shadow)">
  <rect x="1052" y="245" width="300" height="260" rx="32" fill="#f8fafc"/>
  <rect x="1098" y="295" width="208" height="72" rx="18" fill="#dcfce7"/>
  <text x="1202" y="340" text-anchor="middle" class="label" fill="#166534">检测结果</text>
  <text x="1202" y="418" text-anchor="middle" class="small">检测到 / 未检测到</text>
  <text x="1202" y="455" text-anchor="middle" class="small">只说明是否发现支持的特征</text>
</g>

<g transform="translate(156,615)">
  <rect width="1088" height="92" rx="26" fill="#020617" opacity="0.46" stroke="#334155"/>
  <text x="544" y="38" text-anchor="middle" class="sub">核心边界：它能帮助判断“是否来自 OpenAI 工具”</text>
  <text x="544" y="70" text-anchor="middle" class="sub">但不能判断图片内容是否真实、语境是否准确</text>
</g>
</svg>