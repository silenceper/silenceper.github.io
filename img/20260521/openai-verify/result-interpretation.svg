<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="55%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#1e293b"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
  </filter>
  <style>
    .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:50px;font-weight:800;fill:#f8fafc}
    .sub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:24px;fill:#cbd5e1}
    .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:25px;font-weight:700;fill:#0f172a}
    .small{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:19px;fill:#475569}
    .white{fill:#fff}.muted{fill:#94a3b8}.accent{fill:#34d399}.stroke{stroke:#334155;stroke-width:2;fill:none}
  </style>
</defs>

<rect width="1400" height="820" fill="#0b1120"/>
<text x="90" y="100" class="title">如何理解检测结果？</text>
<text x="92" y="150" class="sub">检测工具给的是来源线索，不是事实裁判</text>

<g filter="url(#shadow)">
  <rect x="105" y="245" width="540" height="390" rx="34" fill="#ecfdf5"/>
  <circle cx="180" cy="330" r="42" fill="#10b981"/>
  <path d="M160 330 L176 348 L203 310" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="245" y="322" class="label">检测到相关特征</text>
  <text x="245" y="362" class="small">说明图片极有可能来自 OpenAI 工具</text>
  <line x1="150" y1="420" x2="595" y2="420" stroke="#bbf7d0" stroke-width="3"/>
  <text x="150" y="475" class="small">可以相信：</text>
  <text x="250" y="475" class="small">来源信号很强，误报较少</text>
  <text x="150" y="525" class="small">不能证明：</text>
  <text x="250" y="525" class="small">图中事件真实、语境准确、未被二改</text>
</g>

<g filter="url(#shadow)">
  <rect x="755" y="245" width="540" height="390" rx="34" fill="#fff7ed"/>
  <circle cx="830" cy="330" r="42" fill="#f97316"/>
  <path d="M812 312 L848 348 M848 312 L812 348" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <text x="895" y="322" class="label">未检测到相关特征</text>
  <text x="895" y="362" class="small">只说明没有发现当前支持的信号</text>
  <line x1="800" y1="420" x2="1245" y2="420" stroke="#fed7aa" stroke-width="3"/>
  <text x="800" y="475" class="small">可能原因：</text>
  <text x="920" y="475" class="small">元数据被清除、水印受损、旧模型生成</text>
  <text x="800" y="525" class="small">不能反推：</text>
  <text x="920" y="525" class="small">一定不是 AI 图，也不能证明它真实</text>
</g>

<g transform="translate(230,700)">
  <rect width="940" height="64" rx="22" fill="#111827" stroke="#334155"/>
  <text x="470" y="41" text-anchor="middle" class="sub">正确用法：把检测结果当作核查线索，再结合上下文继续判断</text>
</g>
</svg>